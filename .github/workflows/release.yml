# jamestelfer/boxed — build/attest/publish on the v* tag pushed by release-please.
# Delegates to the shared chinmina release kit, pinned to the verified-actions
# branch (third-party actions SHA-pinned and reviewed).
name: release

on:
  push:
    tags: ["v*"]

# Default-deny at the workflow level; the GITHUB_TOKEN ceiling is granted on the
# calling job below (secure by default — no other job could ever see it).
permissions: {}

jobs:
  release:
    # Caller permissions are a CEILING: a reusable workflow can only downgrade
    # the GITHUB_TOKEN, never elevate it. Grant at least what
    # goreleaser-release.yml's job declares — id-token for the octo-sts mint,
    # contents:write to fill the release-please draft, attestations:write to
    # record keyless provenance.
    permissions:
      contents: write # fill + publish the release, push assets
      id-token: write # octo-sts OIDC mint + keyless attestation
      attestations: write # record build attestations
    uses: chinmina/.github/.github/workflows/goreleaser-release.yml@verified-actions
    with:
      # Keyless: mint the release-boxed token (and release-tap for homebrew)
      # against the centralised trust policies instead of github.token/a PAT.
      # Identities/scope are derived by convention — nothing passed.
      token-source: octo-sts
      disable-npm: true # no npm package published; opt out of default-on npm channel
      disable-docker-login: true # no container image published; opt out of default-on Docker Hub login
      # GitHub release + Homebrew + binstaller all enabled (workflow defaults).
    # No `secrets:` block: the octo-sts path is keyless — even the Homebrew tap
    # write is a minted release-tap token, not a stored HOMEBREW_GITHUB_TOKEN.
