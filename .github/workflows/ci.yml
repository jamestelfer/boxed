name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: false

      - name: Read just version
        id: tool-versions
        run: echo "just=$(mise current just)" >> "$GITHUB_OUTPUT"

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: ${{ steps.tool-versions.outputs.just }}

      - name: Run tests
        run: just test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: false

      - name: Read tool versions
        id: tool-versions
        run: |
          echo "just=$(mise current just)" >> "$GITHUB_OUTPUT"
          echo "golangci-lint=$(mise current golangci-lint)" >> "$GITHUB_OUTPUT"

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: ${{ steps.tool-versions.outputs.just }}

      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v${{ steps.tool-versions.outputs.golangci-lint }}

  flake:
    name: Nix flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Build flake package
        run: nix build .#boxed --print-build-logs

      - name: Check flake
        run: nix flake check --print-build-logs
