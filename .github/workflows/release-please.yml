# jamestelfer/boxed — release-please trigger (keyless octo-sts path).
# Delegates to the shared chinmina release kit, pinned to the verified-actions
# branch (third-party actions SHA-pinned and reviewed).
name: release-please

on:
  push:
    branches: [main]

# Default-deny at the workflow level; the GITHUB_TOKEN ceiling is granted on the
# calling job below (secure by default — no other job could ever see it).
permissions: {}

jobs:
  release-please:
    # Caller permissions are a CEILING: a reusable workflow can only downgrade
    # the GITHUB_TOKEN, never elevate it, so grant at least what the reusable
    # workflow's job declares. Omitting id-token: write would starve the
    # octo-sts OIDC mint and the run would die on its first step.
    permissions:
      contents: read
      id-token: write # octo-sts OIDC token exchange
    uses: chinmina/.github/.github/workflows/release-please.yml@verified-actions
    with:
      # Keyless: mint the release-please-boxed token against the centralised
      # trust policies (identity/scope are derived by convention — nothing passed).
      token-source: octo-sts
    # No `secrets:` block: the octo-sts path is keyless. (On the `app` path you
    # would add `secrets: inherit` so the environment-scoped RELEASE_PLEASE_*
    # secrets resolve inside the reusable workflow's environment-targeting job.)
